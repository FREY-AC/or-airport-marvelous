name: formula
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8212 }
          - { version: 3381 }
          - { version: 4376 }
          - { version: 5347 }
          - { version: 3245 }
          - { version: 8840 }
          - { version: 3798 }
          - { version: 1142 }
          - { version: 1062 }
          - { version: 5534 }
          - { version: 4566 }
          - { version: 8118 }
          - { version: 6902 }
          - { version: 9542 }
          - { version: 1185 }
